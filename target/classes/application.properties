# ===================================================================
# SPRING BOOT APPLICATION CONFIGURATION
# ===================================================================

# Server Port
server.port=${PORT:8080}

# ===================================================================
# POSTGRESQL DATABASE CONFIGURATION
# ===================================================================
# Agar bazangiz nomi boshqacha bo'lsa, 'crm_db' o'rniga o'zgartiring
spring.datasource.url=jdbc:postgresql://localhost:5432/crm_db
spring.datasource.username=postgres
spring.datasource.password=123

# PostgreSQL drayver classi
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
# update: Ma'lumotlar bazasida jadvallar yo'q bo'lsa, avtomat yaratadi
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Statik resurslar uchun keshni o'chirish (frontend o'zgarishlari tez ko'rinishi uchun)
spring.web.resources.cache.period=0
spring.thymeleaf.cache=false
